openapi: 3.1.0
info:
  title: AccessDoc API
  version: 1.0.0
  description: |
    Automatic PDF accessibility remediation powered by Gemma 4.
    Produces PDF/UA-1 (ISO 14289) and WCAG 2.1 AA compliant documents.

servers:
  - url: http://localhost:8000/api/v1
    description: Local development
  - url: https://accessdoc.app/api/v1
    description: Production

components:
  schemas:

    JobStatus:
      type: string
      enum:
        - pending
        - extracting
        - analyzing
        - generating_alt_text
        - building_tags
        - validating
        - completed
        - failed

    SemanticRole:
      type: string
      enum:
        - H1
        - H2
        - H3
        - H4
        - H5
        - H6
        - P
        - L
        - LI
        - LBody
        - Table
        - TR
        - TH
        - TD
        - Figure
        - Caption
        - TOC
        - TOCI
        - Footnote
        - Artifact
        - Formula
        - Code

    WCAGCriterion:
      type: string
      enum:
        - "1.1.1"
        - "1.3.1"
        - "1.3.2"
        - "2.4.1"
        - "2.4.2"
        - "3.1.1"
        - "4.1.2"

    ProcessingOptions:
      type: object
      properties:
        language_override:
          type: string
          nullable: true
          example: "es"
        ocr_enabled:
          type: boolean
          default: true
        model_size:
          type: string
          enum: [fast, accurate]
          default: accurate
        retry_on_low_score:
          type: boolean
          default: true

    JobCreatedResponse:
      type: object
      required:
        - job_id
        - status
        - estimated_seconds
        - sse_url
        - expires_at
      properties:
        job_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/JobStatus'
        estimated_seconds:
          type: integer
          example: 45
        sse_url:
          type: string
          example: "/api/v1/jobs/550e8400.../progress"
        expires_at:
          type: string
          format: date-time

    ProgressEvent:
      type: object
      required:
        - job_id
        - status
        - progress_pct
        - current_step
        - timestamp
      properties:
        job_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/JobStatus'
        progress_pct:
          type: integer
          minimum: 0
          maximum: 100
        current_step:
          type: string
          example: "Analizando página 3 de 12..."
        pages_processed:
          type: integer
          nullable: true
        pages_total:
          type: integer
          nullable: true
        timestamp:
          type: string
          format: date-time

    BlockChange:
      type: object
      required:
        - block_id
        - page_num
        - change_type
        - criterion
      properties:
        block_id:
          type: string
        page_num:
          type: integer
          minimum: 1
        change_type:
          type: string
          enum:
            - heading_tagged
            - alt_text_added
            - artifact_marked
            - reading_order_fixed
            - table_header_tagged
            - list_structured
            - heading_level_fixed
            - language_set
            - title_set
            - bookmark_added
        criterion:
          $ref: '#/components/schemas/WCAGCriterion'
        before:
          type: string
          nullable: true
          example: "Texto en negrita 18pt sin etiqueta semántica"
        after:
          type: string
          nullable: true
          example: "<H2> Introducción"
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          example: 0.94

    AccessibilityScore:
      type: object
      required:
        - overall
        - pdfua1_compliant
        - wcag21_aa_compliant
        - criteria_scores
      properties:
        overall:
          type: integer
          minimum: 0
          maximum: 100
        pdfua1_compliant:
          type: boolean
        wcag21_aa_compliant:
          type: boolean
        criteria_scores:
          type: object
          additionalProperties:
            type: integer
          example:
            "1.1.1": 95
            "1.3.1": 88
            "1.3.2": 100
        rules_passed:
          type: integer
        rules_total:
          type: integer

    RemainingIssue:
      type: object
      required:
        - criterion
        - severity
        - description
        - count
      properties:
        criterion:
          $ref: '#/components/schemas/WCAGCriterion'
        severity:
          type: string
          enum: [critical, major, minor]
        description:
          type: string
        count:
          type: integer
        pages_affected:
          type: array
          items:
            type: integer

    JobResultResponse:
      type: object
      required:
        - job_id
        - status
        - original_filename
        - before_score
        - after_score
        - changes_applied
        - remaining_issues
        - download_url
        - report_url
        - processed_at
      properties:
        job_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/JobStatus'
        original_filename:
          type: string
        page_count:
          type: integer
        before_score:
          $ref: '#/components/schemas/AccessibilityScore'
        after_score:
          $ref: '#/components/schemas/AccessibilityScore'
        changes_applied:
          type: array
          items:
            $ref: '#/components/schemas/BlockChange'
        changes_summary:
          type: object
          additionalProperties:
            type: integer
          example:
            heading_tagged: 8
            alt_text_added: 14
            reading_order_fixed: 3
        remaining_issues:
          type: array
          items:
            $ref: '#/components/schemas/RemainingIssue'
        download_url:
          type: string
        report_url:
          type: string
        processed_at:
          type: string
          format: date-time
        processing_time_seconds:
          type: number
        model_used:
          type: string
          example: "google/gemma-4-31b-it:free"

    ErrorResponse:
      type: object
      required:
        - error_code
        - message
        - timestamp
      properties:
        error_code:
          type: string
          enum:
            - FILE_TOO_LARGE
            - INVALID_FILE_TYPE
            - PASSWORD_PROTECTED
            - CORRUPTED_PDF
            - OCR_FAILED
            - ANALYSIS_FAILED
            - VALIDATION_FAILED
            - JOB_NOT_FOUND
            - JOB_EXPIRED
            - RATE_LIMIT_EXCEEDED
            - INTERNAL_ERROR
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        details:
          type: object
          nullable: true

    HealthResponse:
      type: object
      required:
        - status
        - version
        - dependencies
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        version:
          type: string
          example: "1.0.0"
        dependencies:
          type: object
          properties:
            openrouter:
              type: string
              enum: [up, down, degraded]
            verapdf:
              type: string
              enum: [up, down]
            disk_space_mb:
              type: integer

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimit:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

paths:
  /health:
    get:
      operationId: getHealth
      summary: Service health check
      tags: [System]
      responses:
        '200':
          description: Service status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /jobs:
    post:
      operationId: createJob
      summary: Upload a PDF and create an accessibility job
      tags: [Jobs]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                options:
                  type: string
                  description: JSON string of ProcessingOptions
                  default: "{}"
      responses:
        '202':
          description: Job created. Use sse_url to track progress.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobCreatedResponse'
        '400':
          description: Invalid file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimit'

  /jobs/{job_id}/progress:
    get:
      operationId: getJobProgress
      summary: Real-time progress stream (Server-Sent Events)
      description: |
        SSE endpoint. Client must use EventSource JavaScript API.
        Emits events every ~1.5 seconds during processing.
        Closes when job reaches 'completed' or 'failed'.
      tags: [Jobs]
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /jobs/{job_id}/result:
    get:
      operationId: getJobResult
      summary: Get complete accessibility report
      tags: [Jobs]
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Complete processing result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResultResponse'
        '202':
          description: Job still in progress. Keep listening to SSE.
        '404':
          $ref: '#/components/responses/NotFound'

  /jobs/{job_id}/download:
    get:
      operationId: downloadAccessiblePDF
      summary: Download the generated accessible PDF
      tags: [Jobs]
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Accessible PDF file
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="documento_accesible.pdf"'
            X-Accessibility-Score:
              schema:
                type: integer
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'

  /jobs/{job_id}/report:
    get:
      operationId: downloadReport
      summary: Download accessibility report as JSON
      tags: [Jobs]
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Full JSON report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResultResponse'
        '404':
          $ref: '#/components/responses/NotFound'
